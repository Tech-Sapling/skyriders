<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Riders - Full Stretch</title>
    <style>
        /* Force the body to take up the full screen with no scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* The Container acts as the 'crop' area */
        .zoom-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Iframe is stretched and then zoomed */
        #game-iframe {
            width: 100%;
            height: 100%;
            border: none;
            
            /* STRETCH & ZOOM LOGIC */
            /* Scale 1.15 zooms in 15%, pushing the top/bottom bars off-screen */
            transform: scale(1.15); 
            transform-origin: center center;
        }
    </style>
</head>
<body>

    <div class="zoom-container">
        <iframe 
            id="game-iframe"
            src="https://sky-riders-buk.game-files.crazygames.com/unity/unity2020/sky-riders-buk.html?v=1.357" 
            allow="accelerometer; gyroscope; gamepad; autoplay; payment; fullscreen; microphone; clipboard-read; clipboard-write 'self'" 
            allowfullscreen="true"
            sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-presentation allow-scripts allow-same-origin allow-downloads allow-popups-to-escape-sandbox">
        </iframe>
    </div>

</body>
</html>
