<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Riders - Play Now</title>
    <style>
        /* The Container: This acts like a window frame */
        .game-clipping-wrapper {
            width: 100%;
            max-width: 1000px; /* Adjust to your preferred game width */
            margin: 0 auto;
            aspect-ratio: 16 / 9; /* Maintains standard widescreen look */
            position: relative;
            overflow: hidden; /* This is the key: it hides anything outside the box */
            border: 4px solid #222;
            border-radius: 8px;
            background: #000;
        }

        /* The Game: We make it taller than the window to hide the bottom bar */
        .game-clipping-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /* 112% height pushes the bottom ~12% (the bar) below the clipping edge */
            height: 112%; 
            border: none;
        }
    </style>
</head>
<body>

    <div class="game-clipping-wrapper">
        <iframe 
            src="https://sky-riders-buk.game-files.crazygames.com/unity/unity2020/sky-riders-buk.html?v=1.357" 
            allow="accelerometer; gyroscope; gamepad; autoplay; payment; fullscreen; microphone; clipboard-read; clipboard-write 'self'" 
            webkitallowfullscreen="true" 
            mozallowfullscreen="true" 
            msallowfullscreen="true" 
            allowfullscreen="true" 
            sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-presentation allow-scripts allow-same-origin allow-downloads allow-popups-to-escape-sandbox">
        </iframe>
    </div>

</body>
</html>
