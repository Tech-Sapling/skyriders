<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Riders - Clean Embed</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* The Window Frame */
        .game-window {
            width: 100%;
            height: 100%;
            max-width: 1200px; /* Optional: limits max size */
            max-height: 675px; /* Optional: keeps 16:9 ratio */
            position: relative;
            overflow: hidden; /* This acts as the scissors to cut the bars */
            border: none;
        }

        /* The Game Content */
        #game-iframe {
            position: absolute;
            
            /* PUSH UP: This hides the "More games on CrazyGames" top bar */
            top: -45px; 
            
            left: 0;
            width: 100%;
            
            /* STRETCH DOWN: This pushes the bottom bar out of the frame */
            height: calc(100% + 95px); 
            
            border: none;
        }
    </style>
</head>
<body>

    <div class="game-window">
        <iframe 
            id="game-iframe"
            src="https://sky-riders-buk.game-files.crazygames.com/unity/unity2020/sky-riders-buk.html?v=1.357" 
            allow="accelerometer; gyroscope; gamepad; autoplay; payment; fullscreen; microphone; clipboard-read; clipboard-write 'self'" 
            allowfullscreen="true"
            sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-presentation allow-scripts allow-same-origin allow-downloads allow-popups-to-escape-sandbox">
        </iframe>
    </div>

</body>
</html>
